name: Bug Report
description: Report a problem with docs, examples, or skill quality.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: location
    attributes:
      label: Where is the issue?
      description: Provide file path, section, or skill name.
      placeholder: skills/meeting-minutes/README.md
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current behavior
      description: What is wrong, unclear, or broken?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Add screenshots, reproduction steps, or edge-case input if useful.

